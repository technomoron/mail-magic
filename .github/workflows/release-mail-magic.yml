name: Release mail-magic

on:
    push:
        tags:
            - '@technomoron/mail-magic@*'
    workflow_dispatch:

permissions:
    contents: write
    id-token: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'

            - name: Install Dependencies
              run: pnpm install --no-frozen-lockfile --link-workspace-packages

            - name: Verify Release Candidate
              run: pnpm release:verify -- --ci packages/server

            - name: Pack npm Package
              run: npm pack
              working-directory: packages/server

            - name: Publish npm Package
              if: github.event_name == 'push'
              run: bash ./scripts/release-package-publish.sh packages/server --ci
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Create GitHub Release
              if: github.event_name == 'push'
              uses: softprops/action-gh-release@v1
              with:
                  files: |
                      packages/server/*.tgz
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
