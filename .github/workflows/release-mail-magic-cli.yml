name: Release mail-magic-cli

on:
    push:
        tags:
            - '@technomoron/mail-magic-cli@*'
    workflow_dispatch:

permissions:
    contents: write
    id-token: write

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    release:
        runs-on: ubuntu-latest
        env:
            NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: 'https://registry.npmjs.org'

            - name: Install Dependencies
              run: pnpm install --no-frozen-lockfile --link-workspace-packages

            - name: Verify Release Candidate
              run: pnpm release:verify -- --ci packages/cli

            - name: Pack npm Package
              run: npm pack
              working-directory: packages/cli

            - name: Publish npm Package
              if: startsWith(github.ref, 'refs/tags/@technomoron/mail-magic-cli@')
              run: bash ./scripts/release-package-publish.sh packages/cli --ci

            - name: Create GitHub Release
              if: startsWith(github.ref, 'refs/tags/@technomoron/mail-magic-cli@')
              uses: softprops/action-gh-release@v1
              with:
                  files: |
                      packages/cli/*.tgz
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
